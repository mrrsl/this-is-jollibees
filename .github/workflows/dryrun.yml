name: Publish VS Code Extension

on:
  push:
    branches: [ '**', '!release' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install vsce
        run: npm install -g vsce

      - name: Install dependencies
        run: |
          npm install
          npm ci
      
      - name: Run setup (slug Map Generation)
        run: |
          npm run setup

      - name: Substitue for actual API keys
        run: |
          sed -E "s/\\{\s*?apiKey\s*?:.+?\}/{apiKey:${{ secrets.GEMINI_KEY }}}/" > src/Engine.js
          grep -E "\{apiKey:.+?\}" src/Engine.js > /dev/null
          if [ $? -ne 0 ]
            echo "Key substitution failed"
            exit 1
          fi
