name: Publish VS Code Extension

on:
  push:
    branches: [ release ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install vsce
        run: npm install -g vsce

      - name: Install dependencies
        run: npm ci

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "Required secret VSCE_PAT is not set" >&2
            exit 1
          fi
          # Publish using the PAT. The repository's package.json should contain a valid "publisher" field.
          npx vsce publish -p "${VSCE_PAT}"
