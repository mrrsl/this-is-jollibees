name: Publish VS Code Extension

on:
  push:
    branches: [ release ]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install vsce
        run: npm install -g vsce

      - name: Install dependencies
        run: |
          npm install
          npm ci
      
      - name: Run setup (slug Map Generation)
        run: |
          npm run setup
        
      - name: Substitue for actual API keys
        run: |
          sed -E 's/\\{\s*?apiKey\s*?:.+?\}/{apiKey: "${{ secrets.GEMINI_KEY }}"}/ src/Engine.js > src/Engine.js

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "Required secret VSCE_PAT is not set" >&2
            exit 1
          fi
          # Publish using the PAT. The repository's package.json should contain a valid "publisher" field.
          npx vsce publish -p "${VSCE_PAT}"
