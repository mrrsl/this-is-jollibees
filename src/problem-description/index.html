<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Problem Description</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
      }

      h1 {
        margin-top: 0;
        color: var(--vscode-welcomePage-heading-foreground);
      }

      .container {
        max-width: 100%;
      }

      code {
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <select id="laguage-selection"></select>
    <div class="container">
      <h2 id="title">Problem Description</h2>
      <p id="description">This is where the problem description is.</p>
    </div>
  </body>
  <script>
  const vscode = acquireVsCodeApi();

  const titleRef = document.getElementById("title");
  const descripRef = document.getElementById("description");
  const languages = {
    "C++":        { extension: "cpp"   },
    "Java":       { extension: "java"  },
    "Python3":    { extension: "py"    },
    "Python":     { extension: "py"    },
    "JavaScript": { extension: "js"    },
    "TypeScript": { extension: "ts"    },
    "C#":         { extension: "cs"    },
    "C":          { extension: "c"     },
    "Go":         { extension: "go"    },
    "Kotlin":     { extension: "kt"    },
    "Swift":      { extension: "swift" },
    "Rust":       { extension: "rs"    },
    "Ruby":       { extension: "rb"    },
    "PHP":        { extension: "php"   },
    "Dart":       { extension: "dart"  },
    "Scala":      { extension: "scala" },
    "Elixir":     { extension: "ex"    },
    "Erlang":     { extension: "erl"   },
    "Racket":     { extension: "rkt"   },
  };

  // creates all the options for languages in the dropdown menu
  const dropdown = document.getElementById("laguage-selection");
  for (const language in languages) {
    const option = document.createElement("option");
    option.value = language;
    option.text = language;
    // makes javascript the default language
    if (language === "JavaScript") {
      option.selected = true;
    }
    dropdown.appendChild(option);
  }

  dropdown.addEventListener("change", (event) => {
    const selectedLanguage = event.target.value;
    vscode.postMessage({ command: "setLanguage", language: selectedLanguage });
  });

  window.addEventListener("message", (event) => {
    const data = event.data;
    titleRef.innerHTML = `<code>${data.title}</code>`;
    descripRef.innerHTML = `<code>${data.content}</code>`;
  });
</script>
</html>
