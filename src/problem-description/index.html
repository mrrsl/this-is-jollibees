<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Problem Description</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
      }

      h1 {
        margin-top: 0;
        color: var(--vscode-welcomePage-heading-foreground);
      }

      .container {
        max-width: 100%;
      }
      code {
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <select id="laguage-selection"></select>
    <div class="container">
      <h2 id="title">Problem Description</h2>
      <p id="description">This is where the problem description is.</p>
    </div>
  </body>
  <script>
  // can't import it from languages.js because this is as script tag in html so I'm defining it here
  const languages = {
    "C++": "cpp", "Java": "java", "Python3": "py", "Python": "py",
    "JavaScript": "js", "TypeScript": "ts", "C#": "cs", "C": "c",
    "Go": "go", "Kotlin": "kt", "Swift": "swift", "Rust": "rs",
    "Ruby": "rb", "PHP": "php", "Dart": "dart", "Scala": "scala",
    "Elixir": "ex", "Erlang": "erl", "Racket": "rkt"
  };

  const vscode = acquireVsCodeApi();

  const titleRef = document.getElementById("title");
  const descripRef = document.getElementById("description");

  // creates all the options for languages in the dropdown menu
  const dropdown = document.getElementById("laguage-selection");

  for (const language in languages) {
    const option = document.createElement("option");

    option.value = language;
    option.text = language;

    // makes javascript the default language
    if (language === "JavaScript") {
      option.selected = true;
    }
    dropdown.appendChild(option);
  }

  dropdown.addEventListener("change", (event) => {
    const selectedLanguage = event.target.value;

    //sends this to ProblemDescription.js
    vscode.postMessage({ command: "setLanguage", language: selectedLanguage });
  });

  window.addEventListener("message", (event) => {
    const { problem, currentLanguage } = event.data;

    titleRef.innerHTML = `<code>${problem.title}</code>`;
    descripRef.innerHTML = `<code>${problem.content}</code>`;

    if (currentLanguage) {
      dropdown.value = currentLanguage;
    }
  });
</script>
</html>
