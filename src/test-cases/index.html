<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Test Cases</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
      }

      h1 {
        margin-top: 0;
        color: var(--vscode-welcomePage-heading-foreground);
      }

      .container {
        max-width: 100%;
      }

      code {
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 id="title">Test cases</h2>
      <p id="cases">Generating...</p>
    </div>
  </body>
  <script>
    const titleRef = document.getElementById("title");
    const descripRef = document.getElementById("description");
    /*
    List of potential objects that may be passed through the message event
    - Problem from @leetnotion/leetcode-api
    */
    window.addEventListener("message", (event) => {
      const data = event.data;
      titleRef.innerHTML = `<h1>Test Cases</h1>`;
      descripRef.innerHTML = `<code>${data}</code>`;
    });
  </script>
</html>
